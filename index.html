<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNF 职业技能加点配置</title>
    <link rel="icon" type="image/jpeg" href="images/狂战士.jpeg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: url('images/bg.jpg') center center no-repeat fixed;
            background-size: cover;
            min-height: 100vh;
            color: #fff;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 25, 60, 0.85);
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        h1 {
            text-align: center;
            padding: 30px 0;
            font-size: 2.5em;
            background: linear-gradient(90deg, #00d4ff, #0099ff, #66ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 153, 255, 0.5);
            filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.3));
        }

        .search-bar {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .search-bar input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid rgba(0, 153, 255, 0.3);
            border-radius: 25px;
            background: rgba(0, 30, 80, 0.6);
            color: #fff;
            font-size: 16px;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
        }

        .search-bar input:focus {
            outline: none;
            border-color: rgba(0, 212, 255, 0.8);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .search-bar input::placeholder {
            color: rgba(102, 204, 255, 0.6);
        }

        .base-class-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .base-class-tab {
            padding: 10px 20px;
            border: 2px solid rgba(0, 153, 255, 0.3);
            border-radius: 20px;
            background: rgba(0, 30, 80, 0.6);
            color: #66ccff;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .base-class-tab:hover,
        .base-class-tab.active {
            background: linear-gradient(90deg, #00d4ff, #0099ff);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .class-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .class-card {
            background: rgba(0, 30, 80, 0.6);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 153, 255, 0.2);
        }

        .class-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
            border-color: rgba(0, 212, 255, 0.5);
        }

        .class-header {
            padding: 15px;
            background: linear-gradient(90deg, rgba(0, 153, 255, 0.3), rgba(0, 212, 255, 0.3));
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .class-icon {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            background: rgba(0, 50, 120, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            border: 2px solid rgba(0, 212, 255, 0.5);
            overflow: hidden;
        }

        .class-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .class-info h3 {
            font-size: 1.2em;
            margin-bottom: 0;
        }

        .class-info h3 .gender-text {
            font-size: 0.8em;
            color: rgba(102, 204, 255, 0.5);
            margin-left: 8px;
            font-weight: normal;
        }

        .sub-class-list {
            padding: 15px;
        }

        .sub-class-item {
            padding: 12px;
            margin-bottom: 10px;
            background: rgba(0, 50, 120, 0.4);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(0, 153, 255, 0.1);
        }

        .sub-class-item:hover {
            background: rgba(0, 153, 255, 0.2);
            border-color: rgba(0, 212, 255, 0.4);
        }

        .sub-class-name-wrapper {
            flex: 1;
            cursor: pointer;
            padding-right: 10px;
        }

        .sub-class-name {
            font-weight: bold;
        }

        .skill-points-btn {
            padding: 5px 15px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(90deg, #00d4ff, #0099ff);
            color: #fff;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            box-shadow: 0 2px 10px rgba(0, 212, 255, 0.3);
            z-index: 1;
        }

        .skill-points-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.5);
        }

        /* 无转职职业的样式 */
        .no-sub-class-card {
            padding: 20px;
            background: rgba(0, 50, 120, 0.4);
            border-radius: 10px;
            border: 1px solid rgba(0, 153, 255, 0.1);
            text-align: center;
        }

        .no-sub-class-text {
            color: rgba(102, 204, 255, 0.8);
            margin-bottom: 15px;
        }

        .add-skill-btn {
            padding: 10px 25px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(90deg, #00d4ff, #0099ff);
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            box-shadow: 0 2px 10px rgba(0, 212, 255, 0.3);
        }

        .add-skill-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.5);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 20, 50, 0.9);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(0, 40, 100, 0.95) 0%, rgba(0, 60, 140, 0.95) 100%);
            border-radius: 20px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 30px;
            position: relative;
            border: 2px solid rgba(0, 212, 255, 0.4);
            box-shadow: 0 20px 60px rgba(0, 153, 255, 0.5);
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 30px;
            cursor: pointer;
            color: rgba(102, 204, 255, 0.8);
            transition: color 0.3s;
        }

        .modal-close:hover {
            color: #00d4ff;
        }

        .modal-title {
            font-size: 1.5em;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #00d4ff, #0099ff, #66ccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .skill-input-group {
            margin-bottom: 20px;
        }

        .skill-input-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(102, 204, 255, 0.9);
        }

        .skill-input-group textarea {
            width: 100%;
            height: 150px;
            padding: 12px;
            border: 2px solid rgba(0, 153, 255, 0.3);
            border-radius: 10px;
            background: rgba(0, 30, 80, 0.6);
            color: #fff;
            font-family: monospace;
            font-size: 12px;
            resize: none;
        }

        .skill-input-group textarea:focus {
            outline: none;
            border-color: rgba(0, 212, 255, 0.8);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .skill-input-group textarea::placeholder {
            color: rgba(102, 204, 255, 0.4);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: 2px solid transparent;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(90deg, #00d4ff, #0099ff);
            color: #fff;
            border-color: rgba(0, 212, 255, 0.5);
        }

        .btn-primary:hover {
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.5);
        }

        .btn-secondary {
            background: rgba(0, 50, 120, 0.6);
            color: #66ccff;
            border-color: rgba(0, 153, 255, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(0, 153, 255, 0.2);
            border-color: rgba(0, 212, 255, 0.5);
            color: #fff;
        }

        .copy-feedback {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: linear-gradient(90deg, #00d4ff, #0099ff);
            color: white;
            padding: 15px 30px;
            border-radius: 25px;
            transition: transform 0.3s;
            z-index: 2000;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.5);
            font-size: 14px;
        }

        .copy-feedback.show {
            transform: translateX(-50%) translateY(0);
        }

        .no-sub-class {
            padding: 15px;
            text-align: center;
            color: rgba(102, 204, 255, 0.6);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .class-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> DNF 职业技能加点配置</h1>

        <div class="search-bar">
            <input type="text" id="searchInput" maxlength="10" placeholder="搜索职业或转职...">
        </div>

        <div class="base-class-tabs" id="baseClassTabs"></div>

        <div class="class-grid" id="classGrid"></div>
    </div>

    <!-- Modal -->
    <div class="modal" id="skillModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closeModal()">&times;</span>
            <h2 class="modal-title" id="modalTitle"></h2>

            <div class="skill-input-group">
                <label for="skillPoints">技能加点</label>
                <textarea id="skillPoints" maxlength="500" placeholder="在此粘贴技能加点..."></textarea>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="saveSkillPoints()">💾 保存</button>
                <button class="btn btn-secondary" onclick="copyModalSkillPoints()">📋 复制加点</button>
                <button class="btn btn-secondary" onclick="clearSkillPoints()">🗑️ 清空</button>
            </div>
        </div>
    </div>

    <!-- Copy Feedback -->
    <div class="copy-feedback" id="copyFeedback">✅ 已复制到剪贴板！</div>

    <script>
        // DNF 职业数据结构
        const dnfClasses = [
            {
                baseName: '鬼剑士',
                gender: '男',
                subClasses: ['剑魂', '鬼泣', '狂战士', '阿修罗', '剑影']
            },
            {
                baseName: '鬼剑士',
                gender: '女',
                subClasses: ['驭剑士', '暗殿骑士', '契魔者', '流浪武士', '刃影']
            },
            {
                baseName: '格斗家',
                gender: '男',
                subClasses: ['气功师', '散打', '街霸', '柔道家']
            },
            {
                baseName: '格斗家',
                gender: '女',
                subClasses: ['气功师', '散打', '街霸', '柔道家']
            },
            {
                baseName: '神枪手',
                gender: '男',
                subClasses: ['漫游枪手', '枪炮师', '机械师', '弹药专家', '合金战士']
            },
            {
                baseName: '神枪手',
                gender: '女',
                subClasses: ['漫游枪手', '枪炮师', '机械师', '弹药专家', '协战师']
            },
            {
                baseName: '魔法师',
                gender: '女',
                subClasses: ['元素师', '召唤师', '战斗法师', '魔道学者', '小魔女']
            },
            {
                baseName: '魔法师',
                gender: '男',
                subClasses: ['元素爆破师', '冰结师', '猩红法师', '逐风者', '次元行者']
            },
            {
                baseName: '暗夜使者',
                gender: '-',
                subClasses: ['暗星', '黑夜术士', '忍者', '影舞者']
            },
            {
                baseName: '守护者',
                gender: '-',
                subClasses: ['精灵骑士', '混沌魔灵', '帕拉丁', '龙骑士']
            },
            {
                baseName: '魔枪士',
                gender: '-',
                subClasses: ['征战者', '决战者', '狩猎者', '暗枪士']
            },
            {
                baseName: '枪剑士',
                gender: '-',
                subClasses: ['暗刃', '特工', '战线佣兵', '源能专家']
            },
            {
                baseName: '弓箭手',
                gender: '-',
                subClasses: ['缪斯', '旅人', '猎人', '妖护使', '奇美拉']
            },
            {
                baseName: '光职者',
                gender: '女',
                subClasses: ['光明骑士', '正义审判者', '驱魔师', '除恶者', '蓝拳使者']
            },
            {
                baseName: '光职者',
                gender: '男',
                subClasses: ['光明骑士', '蓝拳使者', '驱魔师', '惩戒者']
            },
            {
                baseName: '帝国骑士',
                gender: '-',
                subClasses: ['破浪者']
            },
            {
                baseName: '黑暗武士',
                gender: '-',
                subClasses: []
            },
            {
                baseName: '缔造者',
                gender: '-',
                subClasses: []
            }
        ];

        let currentSubClass = null;
        let skillPointsData = {};

        // 从 localStorage 加载数据
        function loadSkillPoints() {
            const saved = localStorage.getItem('dnfSkillPoints');
            if (saved) {
                try {
                    skillPointsData = JSON.parse(saved);
                } catch (e) {
                    console.error('加载技能加点失败:', e);
                    skillPointsData = {};
                }
            }
        }

        // 保存到 localStorage
        function saveToLocalStorage() {
            localStorage.setItem('dnfSkillPoints', JSON.stringify(skillPointsData));
        }

        // 获取唯一键
        function getKey(baseName, gender, subClass) {
            return `${baseName}_${gender}_${subClass}`;
        }

        // 渲染基础职业标签
        function renderBaseClassTabs() {
            const tabsContainer = document.getElementById('baseClassTabs');
            const baseNames = [...new Set(dnfClasses.map(c => c.baseName))];

            tabsContainer.innerHTML = `
                <button class="base-class-tab active" data-filter="all">全部</button>
                ${baseNames.map(name => `
                    <button class="base-class-tab" data-filter="${name}">${name}</button>
                `).join('')}
            `;

            tabsContainer.querySelectorAll('.base-class-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    tabsContainer.querySelectorAll('.base-class-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    renderClassGrid(tab.dataset.filter);
                });
            });
        }

        // 渲染职业卡片
        function renderClassGrid(filter = 'all') {
            const grid = document.getElementById('classGrid');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            let filteredClasses = dnfClasses;

            if (filter !== 'all') {
                filteredClasses = filteredClasses.filter(c => c.baseName === filter);
            }

            if (searchTerm) {
                filteredClasses = filteredClasses.filter(c =>
                    c.baseName.toLowerCase().includes(searchTerm) ||
                    c.subClasses.some(sub => sub.toLowerCase().includes(searchTerm))
                );
            }

            grid.innerHTML = filteredClasses.map(cls => {
                // 特殊处理：黑暗武士和缔造者（无转职但可添加技能）
                if (cls.baseName === '黑暗武士' || cls.baseName === '缔造者') {
                    const key = getKey(cls.baseName, cls.gender, cls.baseName);
                    const hasSkill = skillPointsData[key];
                    const iconImg = cls.baseName === '黑暗武士' ? '<img src="images/heianwushi.png" alt="黑暗武士">' : '<img src="images/dizaozhe.png" alt="缔造者">';
                    return `
                        <div class="class-card">
                            <div class="class-header">
                                <div class="class-icon">${iconImg}</div>
                                <div class="class-info">
                                    <h3>${cls.baseName}${cls.gender !== '-' ? `<span class="gender-text">（${cls.gender}）</span>` : ''}</h3>
                                </div>
                            </div>
                            <div class="sub-class-list">
                                <div class="sub-class-item" onclick="copySubClassSkill('${cls.baseName}', '${cls.gender}', '${cls.baseName}')">
                                    <span class="sub-class-name">${cls.baseName}</span>
                                    <button class="skill-points-btn" onclick="event.stopPropagation(); openSkillModal('${cls.baseName}', '${cls.gender}', '${cls.baseName}')">
                                        ${hasSkill ? '✏️ 编辑' : ' 添加'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                }

                // 普通职业（有转职）- 根据职业名显示对应图标
                let iconHtml = '';
                if (cls.baseName === '鬼剑士') {
                    iconHtml = cls.gender === '男' ? '<img src="images/guijianshin.png" alt="男鬼剑士">' : '<img src="images/guijianshinv.png" alt="女鬼剑士">';
                } else if (cls.baseName === '格斗家') {
                    iconHtml = cls.gender === '男' ? '<img src="images/gedoujian.png" alt="男格斗家">' : '<img src="images/gedoujianv.png" alt="女格斗家">';
                } else if (cls.baseName === '神枪手') {
                    iconHtml = cls.gender === '男' ? '<img src="images/shenqiangshoun.png" alt="男神枪手">' : '<img src="images/shenqiangshounv.png" alt="女神枪手">';
                } else if (cls.baseName === '魔法师') {
                    iconHtml = cls.gender === '男' ? '<img src="images/mofashin.png" alt="男魔法师">' : '<img src="images/mofashinv.png" alt="女魔法师">';
                } else if (cls.baseName === '光职者') {
                    iconHtml = cls.gender === '男' ? '<img src="images/guangzhizhen.png" alt="男光职者">' : '<img src="images/guangzhizhenv.png" alt="女光职者">';
                } else if (cls.baseName === '弓箭手') {
                    iconHtml = '<img src="images/gongjianshou.png" alt="弓箭手">';
                } else if (cls.baseName === '暗夜使者') {
                    iconHtml = '<img src="images/anyeshizhe.png" alt="暗夜使者">';
                } else if (cls.baseName === '守护者') {
                    iconHtml = '<img src="images/shouhuzhe.png" alt="守护者">';
                } else if (cls.baseName === '魔枪士') {
                    iconHtml = '<img src="images/moqiangshi.png" alt="魔枪士">';
                } else if (cls.baseName === '枪剑士') {
                    iconHtml = '<img src="images/qiangjianshi.png" alt="枪剑士">';
                } else if (cls.baseName === '帝国骑士') {
                    iconHtml = '<img src="images/diguoqishi.png" alt="帝国骑士">';
                } else {
                    iconHtml = cls.gender === '男' ? '' : cls.gender === '女' ? '♀' : '';
                }

                return `
                    <div class="class-card">
                        <div class="class-header">
                            <div class="class-icon">${iconHtml}</div>
                            <div class="class-info">
                                <h3>${cls.baseName}${cls.gender !== '-' ? `<span class="gender-text">（${cls.gender}）</span>` : ''}</h3>
                            </div>
                        </div>
                        <div class="sub-class-list">
                            ${cls.subClasses.map(sub => {
                                const key = getKey(cls.baseName, cls.gender, sub);
                                const hasSkill = skillPointsData[key];
                                return `
                                    <div class="sub-class-item">
                                        <div class="sub-class-name-wrapper" onclick="copySubClassSkill('${cls.baseName}', '${cls.gender}', '${sub}')">
                                            <span class="sub-class-name">${sub}</span>
                                        </div>
                                        <button class="skill-points-btn" onclick="event.stopPropagation(); openSkillModal('${cls.baseName}', '${cls.gender}', '${sub}')">
                                            ${hasSkill ? '✏️ 编辑' : ' 添加'}
                                        </button>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 复制转职技能加点
        function copySubClassSkill(baseName, gender, subClass) {
            const key = getKey(baseName, gender, subClass);
            const value = skillPointsData[key];

            if (!value) {
                showFeedback('⚠️ 该转职暂无技能加点');
                return;
            }

            navigator.clipboard.writeText(value).then(() => {
                showFeedback(`✅ 已复制 ${subClass} 的技能加点`);
            }).catch(() => {
                // Fallback for older browsers
                const textarea = document.createElement('textarea');
                textarea.value = value;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showFeedback(`✅ 已复制 ${subClass} 的技能加点`);
            });
        }

        // 打开技能加点模态框
        function openSkillModal(baseName, gender, subClass) {
            currentSubClass = { baseName, gender, subClass };
            const key = getKey(baseName, gender, subClass);

            let titleText = `${baseName}`;
            if (gender !== '-') {
                titleText += `（${gender}）`;
            }
            if (subClass !== baseName) {
                titleText += ` - ${subClass}`;
            }

            document.getElementById('modalTitle').textContent = titleText;
            document.getElementById('skillPoints').value = skillPointsData[key] || '';
            document.getElementById('skillModal').classList.add('show');
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('skillModal').classList.remove('show');
            currentSubClass = null;
        }

        // 保存技能加点
        function saveSkillPoints() {
            if (!currentSubClass) return;

            const key = getKey(currentSubClass.baseName, currentSubClass.gender, currentSubClass.subClass);
            const value = document.getElementById('skillPoints').value.trim();

            if (value) {
                skillPointsData[key] = value;
            } else {
                delete skillPointsData[key];
            }

            saveToLocalStorage();
            closeModal();
            renderClassGrid(document.querySelector('.base-class-tab.active').dataset.filter);
            showFeedback('✅ 保存成功！');
        }

        // 复制弹窗中的技能加点
        function copyModalSkillPoints() {
            const value = document.getElementById('skillPoints').value.trim();

            if (!value) {
                showFeedback('️ 没有可复制的内容');
                return;
            }

            navigator.clipboard.writeText(value).then(() => {
                showFeedback('✅ 已复制到剪贴板！');
            }).catch(() => {
                // Fallback for older browsers
                const textarea = document.createElement('textarea');
                textarea.value = value;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showFeedback('✅ 已复制到剪贴板！');
            });
        }

        // 清空技能加点
        function clearSkillPoints() {
            document.getElementById('skillPoints').value = '';
        }

        // 显示反馈消息（Toast）
        function showFeedback(message) {
            const feedback = document.getElementById('copyFeedback');
            feedback.textContent = message;
            feedback.classList.add('show');

            setTimeout(() => {
                feedback.classList.remove('show');
            }, 2000);
        }

        // 搜索功能
        document.getElementById('searchInput').addEventListener('input', () => {
            const activeFilter = document.querySelector('.base-class-tab.active').dataset.filter;
            renderClassGrid(activeFilter);
        });

        // 点击模态框外部关闭
        document.getElementById('skillModal').addEventListener('click', (e) => {
            if (e.target.id === 'skillModal') {
                closeModal();
            }
        });

        // 初始化
        loadSkillPoints();
        renderBaseClassTabs();
        renderClassGrid();
    </script>
</body>
</html>
